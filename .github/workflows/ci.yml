name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        env:
          # gh CLI requires GH_TOKEN inside Actions; some helpers shell out to it.
          GH_TOKEN: ${{ github.token }}
        # Skip tests that depend on private-only artifacts not mirrored to the
        # public repo (e.g. docs/private-repo-boundary-manifest.json).
        run: |
          pytest tests/unit -q \
            --ignore=tests/unit/test_security_site_derivative.py \
            --ignore=tests/unit/test_security_posture_public_sync.py

  review-app-tests:
    name: Review app unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: review-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: review-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test
